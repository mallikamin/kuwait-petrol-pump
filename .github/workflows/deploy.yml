name: Manual Deploy to Production

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Branch or tag to deploy (for example: master or v2026.04.20-1)"
        required: true
        default: master
      confirm_production:
        description: "Set to yes to allow production deployment"
        required: true
        type: choice
        options:
          - "no"
          - "yes"
        default: "no"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  preflight:
    name: Deployment Confirmation Gate
    runs-on: ubuntu-latest
    steps:
      - name: Validate deployment confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_production }}" != "yes" ]; then
            echo "ERROR: confirmation is '${{ github.event.inputs.confirm_production }}'. Set confirm_production=yes."
            exit 1
          fi
          echo "Confirmed production deploy for ref: ${{ github.event.inputs.deploy_ref }}"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: preflight

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: petrolpump
          POSTGRES_PASSWORD: petrolpump123
          POSTGRES_DB: petrolpump_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.deploy_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @petrol-pump/database exec prisma generate
        env:
          DATABASE_URL: postgresql://petrolpump:petrolpump123@localhost:5432/petrolpump_test

      - name: Run Prisma Migrations
        run: pnpm --filter @petrol-pump/database exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://petrolpump:petrolpump123@localhost:5432/petrolpump_test

      - name: Run Backend Tests
        run: pnpm --filter @petrol-pump/backend test
        env:
          DATABASE_URL: postgresql://petrolpump:petrolpump123@localhost:5432/petrolpump_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          NODE_ENV: test

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.deploy_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://fuelpos.sitaratech.info

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.deploy_ref }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 72.255.51.78 >> ~/.ssh/known_hosts

      - name: Create .env file on server
        run: |
          ssh ${{ secrets.SSH_USER }}@72.255.51.78 "cat > /opt/kuwaitpos/.env << 'EOF'
          NODE_ENV=production
          PORT=3000

          # Database
          DATABASE_URL=postgresql://\${POSTGRES_USER}:\${POSTGRES_PASSWORD}@postgres:5432/\${POSTGRES_DB}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}

          # Redis
          REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}

          # JWT
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          JWT_EXPIRY=15m
          JWT_REFRESH_EXPIRY=7d

          # CORS
          CORS_ORIGIN=https://fuelpos.sitaratech.info,https://kuwaitpos.duckdns.org

          # QuickBooks
          QUICKBOOKS_CLIENT_ID=${{ secrets.QUICKBOOKS_CLIENT_ID }}
          QUICKBOOKS_CLIENT_SECRET=${{ secrets.QUICKBOOKS_CLIENT_SECRET }}
          QUICKBOOKS_REDIRECT_URI=https://fuelpos.sitaratech.info/api/quickbooks/oauth/callback
          QUICKBOOKS_ENVIRONMENT=production

          # Docker
          DOCKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          EOF"

      - name: Copy deployment files to server
        run: |
          scp docker-compose.prod.yml ${{ secrets.SSH_USER }}@72.255.51.78:/opt/kuwaitpos/docker-compose.yml
          scp -r nginx ${{ secrets.SSH_USER }}@72.255.51.78:/opt/kuwaitpos/
          scp -r scripts ${{ secrets.SSH_USER }}@72.255.51.78:/opt/kuwaitpos/

      - name: Deploy application
        run: |
          ssh ${{ secrets.SSH_USER }}@72.255.51.78 "cd /opt/kuwaitpos && bash scripts/deploy.sh"

      - name: Health check
        run: |
          sleep 10
          curl -f https://fuelpos.sitaratech.info/api/health || exit 1

      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "Deployment successful"
          else
            echo "Deployment failed"
            exit 1
          fi
